name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Integration test
        run: go test -tags=integration ./integration/...
      - name: Build
        run: go build -o /tmp/heracles-check ./cmd/heracles

  cross-platform-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { goos: linux, goarch: amd64, suffix: "" }
          - { goos: linux, goarch: arm64, suffix: "" }
          - { goos: darwin, goarch: amd64, suffix: "" }
          - { goos: darwin, goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o "heracles-${GOOS}-${GOARCH}${{ matrix.target.suffix }}" ./cmd/heracles
