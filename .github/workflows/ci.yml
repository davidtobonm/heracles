name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Integration test
        run: go test -tags=integration ./integration/...
      - name: Build
        run: go build -o /tmp/heracles-check ./cmd/heracles

  cross-platform-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { goos: linux, goarch: amd64, suffix: "" }
          - { goos: linux, goarch: arm64, suffix: "" }
          - { goos: darwin, goarch: amd64, suffix: "" }
          - { goos: darwin, goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o "heracles-${GOOS}-${GOARCH}${{ matrix.target.suffix }}" ./cmd/heracles

  cross-platform-install-and-update:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Test install and update packages
        run: go test -race ./internal/install/... ./internal/update/...
      - name: Build heracles
        run: go build -o bin/heracles${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/heracles
      - name: Install into a user directory and verify checksum
        shell: bash
        run: |
          set -euo pipefail
          binary="bin/heracles${{ runner.os == 'Windows' && '.exe' || '' }}"
          install_dir="$RUNNER_TEMP/heracles-bin"
          ./"$binary" install --dir "$install_dir" --json
          installed="$install_dir/heracles${{ runner.os == 'Windows' && '.exe' || '' }}"
          test -f "$installed"
          "$installed" version
          sha256sum "$binary" "$installed"
