name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Verify release source
        run: make check

  build:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { goos: linux, goarch: amd64, suffix: "" }
          - { goos: linux, goarch: arm64, suffix: "" }
          - { goos: darwin, goarch: amd64, suffix: "" }
          - { goos: darwin, goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Build release binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          built="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/davidtobonm/heracles/internal/buildinfo.version=${GITHUB_REF_NAME} -X github.com/davidtobonm/heracles/internal/buildinfo.commit=${GITHUB_SHA} -X github.com/davidtobonm/heracles/internal/buildinfo.built=${built}"
          go build -trimpath -ldflags "${ldflags}" -o "heracles-${GOOS}-${GOARCH}${{ matrix.target.suffix }}" ./cmd/heracles
      - uses: actions/upload-artifact@v7
        with:
          name: heracles-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: heracles-*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum heracles-* > checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/heracles-*
            dist/checksums.txt
          generate_release_notes: true
